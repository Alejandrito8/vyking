{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  hosts:
  - {{ .Values.istio.host | quote }}
  gateways:
  - default/main-gateway 
  http:
  - match:
    - uri:
        prefix: /api/
    # rewrite:
    #   uri: /
    retries:
      attempts: 3
      perTryTimeout: 2s
    route:  
    - destination:
        host: {{ include "frontend.backendHost" . }} 
        port:
          number: {{ default 8080 .Values.backend.port }} 

  - retries:
      attempts: 3
      perTryTimeout: 1s
    route:
    - destination:
        host: {{ include "frontend.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: {{ .Values.service.port }}    
{{- end }}